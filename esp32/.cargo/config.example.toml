[build]
target = "xtensa-esp32-espidf"
target-dir = "C:/esparm"

[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = ["--cfg", "espidf_time64"]

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32"
ESP_IDF_VERSION = "v5.3.2"
WIFI_SSID = "<set-locally>"
WIFI_PASS = "<set-locally>"
